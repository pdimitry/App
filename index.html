<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW KOMBAT: RETRO EDITION</title>
    <style>
        /* Modern Typography */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;600;900&display=swap');

        :root {
            --neon-azure: #00f2ff;
            --neon-crimson: #ff0055;
            --gold: #ffcc00;
            --dark-deep: #0a0b1e;
            --glass: rgba(0, 0, 0, 0.7);
            --border-glow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--dark-deep);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 1024px;
            height: 576px;
            background: #000;
            overflow: hidden;
            border: 4px solid #1a1a2e;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8), var(--border-glow);
            border-radius: 4px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* --- HUD --- */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 20px 40px;
            z-index: 10;
        }

        .health-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .health-container {
            width: 42%;
            height: 38px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 3px;
            position: relative;
            transform: skew(-15deg);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Energy/Super Bar */
        .energy-container {
            width: 35%;
            height: 12px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: absolute;
            top: 65px;
            transform: skew(-15deg);
            overflow: hidden;
        }

        #p1-energy-container { left: 40px; }
        #p2-energy-container { right: 40px; }

        .energy-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2ff, #0055ff);
            transition: width 0.2s;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        #p2-energy-fill {
            background: linear-gradient(-90deg, #ff0055, #ff0000);
            float: right;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }

        .health-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff0, #0f0);
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.5s;
        }

        .health-bar-red {
            background: linear-gradient(90deg, #f00, #ff0);
        }

        .health-fill-behind {
            position: absolute;
            top: 3px;
            left: 3px;
            bottom: 3px;
            right: 3px;
            background: rgba(255, 0, 0, 0.5);
            z-index: -1;
            transition: width 0.8s ease-out;
        }

        #p1-health-fill {
            float: right;
        }

        #p2-health-fill {
            float: left;
        }

        .timer-box {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(255, 204, 0, 0.2), rgba(0, 0, 0, 0.8));
            border: 4px solid var(--gold);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.8);
            margin: 0 10px;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3), inset 0 0 15px rgba(255, 204, 0, 0.2);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
        }

        .player-info {
            display: flex;
            flex-direction: column;
            margin-top: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 16px;
        }

        #p1-name {
            color: var(--neon-azure);
            text-align: left;
        }

        #p2-name {
            color: var(--neon-crimson);
            text-align: right;
        }

        /* --- MESSAGES --- */
        #game-messages {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }

        .big-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 120px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 8px 8px 0 rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 255, 255, 0.3);
            opacity: 0;
            transform: scale(3);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .big-text.show {
            opacity: 1;
            transform: scale(1);
        }

        /* --- OVERLAYS --- */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(15px);
            transition: 0.5s;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 80px;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, #aaa 50%, #444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            text-shadow: 4px 4px var(--neon-crimson), -4px -4px var(--neon-azure);
        }

        .btn {
            margin-top: 40px;
            padding: 15px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            background: transparent;
            border: 2px solid #fff;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.1);
        }

        .controls-hint {
            margin-top: 60px;
            display: flex;
            gap: 40px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
        }

        .controls-hint b {
            color: #fff;
        }

        /* Round Wins Stars */
        .round-wins {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .win-star {
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .win-star.active {
            background: var(--gold);
            box-shadow: 0 0 15px var(--gold);
            transform: scale(1.2);
        }

        /* Scanline Overlay for Health */
        .health-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, transparent 1px, transparent 3px);
            pointer-events: none;
        }

        /* Combo Counter */
        .combo-counter {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 60px;
            font-weight: 900;
            font-style: italic;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold);
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }

        .combo-counter.show {
            opacity: 1;
            transform: scale(1);
        }

        /* CRT Filter */
        #game-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 200;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 200;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.1; }
            10% { opacity: 0.2; }
            20% { opacity: 0.15; }
            100% { opacity: 0.1; }
        }
    </style>
</head>

<body>

    <div id="game-container">
        <!-- Canvas Layers -->
        <canvas id="gameCanvas"></canvas>

        <!-- HUD Layer -->
        <div id="hud">
            <div class="health-row">
                <!-- Player 1 -->
                <div class="health-container" id="p1-container">
                    <div id="p1-health-fill-delay" class="health-fill-behind" style="width: 100%; right: 0;"></div>
                    <div id="p1-health-fill" class="health-bar" style="width: 100%; float: right;"></div>
                </div>

                <!-- Timer -->
                <div class="timer-box" id="timer">99</div>

                <!-- Player 2 -->
                <div class="health-container" id="p2-container">
                    <div id="p2-health-fill-delay" class="health-fill-behind" style="width: 100%; left: 0;"></div>
                    <div id="p2-health-fill" class="health-bar" style="width: 100%; float: left;"></div>
                </div>
            </div>

            <div class="health-row">
                <div class="player-info">
                    <span id="p1-name">AZURE SHADOW</span>
                    <div class="round-wins" id="p1-wins">
                        <div class="win-star"></div>
                        <div class="win-star"></div>
                    </div>
                </div>
                <div class="player-info">
                    <span id="p2-name">CRIMSON WRAITH</span>
                    <div class="round-wins" id="p2-wins" style="justify-content: flex-end;">
                        <div class="win-star"></div>
                        <div class="win-star"></div>
                    </div>
                </div>
            </div>

            <!-- Energy Bars -->
            <div class="energy-container" id="p1-energy-container">
                <div id="p1-energy-fill" class="energy-bar"></div>
            </div>
            <div class="energy-container" id="p2-energy-container">
                <div id="p2-energy-fill" class="energy-bar"></div>
            </div>

            <!-- Combo Counters -->
            <div id="p1-combo" class="combo-counter" style="left: 100px; top: 150px;">2 HIT</div>
            <div id="p2-combo" class="combo-counter" style="right: 100px; top: 150px;">2 HIT</div>
        </div>

        <!-- Messages Overlay -->
        <div id="game-messages">
            <div id="round-announcer" class="big-text">ROUND 1</div>
            <div id="fight-text" class="big-text">FIGHT!</div>
            <div id="ko-text" class="big-text">K.O.</div>
        </div>

        <!-- Start Overlay -->
        <div id="start-overlay" class="overlay">
            <h1>SHADOW KOMBAT</h1>
            <button class="btn" id="start-btn">START BATTLE</button>

            <div class="controls-hint">
                <div>
                    <b>PLAYER 1 (AZURE)</b><br>
                    WASD: Move/Jump/Crouch<br>
                    J: Punch | K: Kick<br>
                    L: special | Shift: Block/Dash
                </div>
                <div>
                    <b>PLAYER 2 (CRIMSON)</b><br>
                    Arrows: Move/Jump/Crouch<br>
                    1: Punch | 2: Kick<br>
                    3: special | 0: Block/Dash
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * SHADOW KOMBAT ENGINE
         * High performance Canvas/State based Logic
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const width = 1024, height = 576;
        canvas.width = width; canvas.height = height;

        // Assets
        const ASSETS = {
            characters: new Image(),
            azure: new Image(),
            crimson: new Image()
        };
        ASSETS.characters.src = 'assets/characters.jpg';
        ASSETS.azure.src = 'assets/azure_shadow.png'; // Fallback
        ASSETS.crimson.src = 'assets/crimson_wraith.png'; // Fallback

        // Constants & Config
        const CONFIG = {
            GRAVITY: 1.2, // Heavier feel
            GROUND_Y: height - 60,
            FPS: 60,
            WALK_SPEED: 7,
            JUMP_FORCE: -22, // Stronger jump to compensate weight
            MAX_HEALTH: 100,
            HIT_STUN: 18,
            KNOCKBACK: 10,
            FRICTION: 0.85 // More grip
        };

        const KEYS = {
            // Player 1
            w: false, a: false, s: false, d: false, j: false, k: false, l: false, shift: false,
            // Player 2
            arrowup: false, arrowleft: false, arrowdown: false, arrowright: false, n1: false, n2: false, n3: false, n0: false
        };

        // Input Handling
        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            const keyMap = { '1': 'n1', '2': 'n2', '3': 'n3', '0': 'n0' };
            const effectiveKey = keyMap[k] || k;
            if (KEYS.hasOwnProperty(effectiveKey)) KEYS[effectiveKey] = true;
        });
        window.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            const keyMap = { '1': 'n1', '2': 'n2', '3': 'n3', '0': 'n0' };
            const effectiveKey = keyMap[k] || k;
            if (KEYS.hasOwnProperty(effectiveKey)) KEYS[effectiveKey] = false;
        });

        // --- CLASSES ---

        class Particle {
            constructor(x, y, color, type = 'PIXEL') {
                this.x = x; this.y = y;
                this.type = type;
                this.life = 1.0;
                this.color = color;

                if (type === 'SPARK') {
                    this.vx = (Math.random() - 0.5) * 15;
                    this.vy = (Math.random() - 0.5) * 15;
                    this.decay = 0.03 + Math.random() * 0.05;
                    this.size = 1 + Math.random() * 2;
                } else if (type === 'EMBER') {
                    this.vx = (Math.random() - 0.5) * 4;
                    this.vy = -Math.random() * 3;
                    this.decay = 0.01 + Math.random() * 0.02;
                    this.size = 2 + Math.random() * 3;
                } else if (type === 'SLASH') {
                    this.vx = 0; this.vy = 0;
                    this.decay = 0.1;
                    this.size = 40 + Math.random() * 40;
                    this.angle = Math.random() * Math.PI * 2;
                } else if (type === 'DUST') {
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = -Math.random() * 2;
                    this.decay = 0.05;
                    this.size = 2 + Math.random() * 5;
                } else if (type === 'RAIN') {
                    this.vx = -2 - Math.random() * 2;
                    this.vy = 15 + Math.random() * 10;
                    this.decay = 0.01;
                    this.size = 1;
                    this.length = 15 + Math.random() * 20;
                } else {
                    this.vx = (Math.random() - 0.5) * 10;
                    this.vy = (Math.random() - 0.5) * 10;
                    this.decay = 0.05;
                    this.size = 2 + Math.random() * 4;
                }
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.type === 'EMBER') this.vx += Math.sin(Date.now() / 100) * 0.1;
                if (this.type === 'RAIN' && this.y >= CONFIG.GROUND_Y) {
                    this.life = 0;
                    // Splash
                    for(let i=0; i<3; i++) game.particles.push(new Particle(this.x, this.y, 'rgba(255,255,255,0.4)', 'PIXEL'));
                }
                this.life -= this.decay;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                if (this.type === 'SPARK') {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    ctx.fillRect(this.x, this.y, this.size * 3, this.size);
                } else if (this.type === 'SLASH') {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, this.angle, this.angle + Math.PI / 2);
                    ctx.stroke();
                } else if (this.type === 'RAIN') {
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + this.vx, this.y + this.length);
                    ctx.stroke();
                } else {
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                }
                ctx.restore();
            }
        }

        class Fireball {
            constructor(x, y, dir, color) {
                this.x = x; this.y = y;
                this.dir = dir;
                this.color = color;
                this.speed = 12;
                this.width = 40; this.height = 10;
                this.damage = 10;
                this.active = true;
            }
            update() {
                this.x += this.speed * this.dir;
                if (this.x < -100 || this.x > width + 100) this.active = false;
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.width, this.height, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Fighter {
            constructor({ position, player, color, name, isFlipped }) {
                this.pos = position;
                this.vel = { x: 0, y: 0 };
                this.player = player;
                this.color = color;
                this.name = name;
                this.width = 60;
                this.height = 150;
                this.isFlipped = isFlipped;

                // State
                this.health = CONFIG.MAX_HEALTH;
                this.energy = 0;
                this.combo = 0;
                this.comboTimer = 0;
                this.state = 'IDLE'; 
                this.dashTimer = 0;
                this.animFrame = 0;
                this.attackFrame = 0;
                this.attackActive = false;
                this.attackType = ''; // PUNCH, KICK, SPECIAL
                this.isAirAttack = false;
                this.isLowAttack = false;
                this.stun = 0;
                this.blocking = false;
                this.crouching = false;
                this.wins = 0;

                // Combat boxes
                this.attackBox = {
                    pos: { x: 0, y: 0 },
                    width: 0,
                    height: 0
                };

                // Sprites & Effects
                this.sprite = player === 1 ? ASSETS.azure : ASSETS.crimson;
                this.trail = [];
                this.maxTrail = 8;
            }

            draw(ctx) {
                // 1. Draw Advanced Trail (Motion Blur)
                this.trail.forEach((t, i) => {
                    t.opacity *= 0.85;
                    ctx.save();
                    ctx.globalAlpha = t.opacity * (i / this.maxTrail);
                    const skew = -this.vel.x * 0.05;
                    ctx.translate(t.x + this.width / 2, t.y + this.height);
                    if (this.isFlipped) ctx.scale(-1, 1);
                    ctx.transform(1, 0, skew, 1, 0, 0);
                    ctx.translate(-this.width / 2, -this.height);
                    
                    // Draw individual sprite
                    ctx.drawImage(this.sprite, 0, 0, this.sprite.width, this.sprite.height, 0, 0, this.width, this.height);
                    ctx.restore();
                });

                // 2. Ambient Particles (Sparks/Embers around fighter)
                if (Math.random() > 0.8) {
                    game.particles.push(new Particle(
                        this.pos.x + Math.random() * this.width,
                        this.pos.y + Math.random() * this.height,
                        this.color,
                        this.player === 1 ? 'SPARK' : 'EMBER'
                    ));
                }

                // 3. APPLY COMBAT ANIMATIONS (Procedural Transforms)
                let animOffset = { x: 0, y: 0, scaleX: 1, scaleY: 1, rotation: 0 };
                
                if (this.state === 'WALK' || this.state === 'DASH') {
                    animOffset.rotation = Math.sin(Date.now() / 100) * 0.1;
                    animOffset.y = Math.abs(Math.sin(Date.now() / 100)) * -4; // Step bounce
                    
                    // Dust particles at feet
                    if (Math.random() > 0.7) {
                        game.particles.push(new Particle(this.pos.x + 10 + Math.random() * 40, CONFIG.GROUND_Y - 5, 'rgba(255,255,255,0.3)', 'DUST'));
                    }
                }

                if (this.state === 'ATTACK') {
                    const f = this.attackFrame;
                    if (this.attackType === 'PUNCH') {
                        if (f < 5) { // Windup
                            animOffset.x = -15; 
                            animOffset.scaleX = 0.9;
                        } else if (f < 10) { // Strike
                            animOffset.x = 40;
                            animOffset.scaleX = 1.3;
                            animOffset.scaleY = 0.9;
                        }
                    } else if (this.attackType === 'KICK') {
                        if (f < 5) {
                            animOffset.rotation = -0.2;
                            animOffset.y = -10;
                        } else if (f < 12) {
                            animOffset.rotation = 0.6;
                            animOffset.x = 20;
                            animOffset.y = -30;
                            animOffset.scaleY = 1.1;
                        }
                    } else if (this.attackType === 'SPECIAL') {
                        animOffset.scaleX = 1.4 + Math.sin(f * 0.5) * 0.2;
                        animOffset.scaleY = 1.4 + Math.cos(f * 0.5) * 0.2;
                        ctx.filter = `hue-rotate(${f * 20}deg) brightness(2)`;
                    }
                }

                ctx.save();

                // Shadow / Glow effect
                ctx.shadowBlur = 30;
                ctx.shadowColor = this.color;

                const centerX = this.pos.x + this.width / 2;
                const bottomY = this.pos.y + this.height;

                // Move to position and apply sprite flip
                ctx.translate(centerX + animOffset.x, bottomY + animOffset.y);
                if (this.isFlipped) ctx.scale(-1, 1);
                
                // Apply Procedural Animation offsets
                ctx.rotate(animOffset.rotation);
                ctx.scale(animOffset.scaleX, animOffset.scaleY);

                // Idle animation (breath/float)
                const breath = Math.sin(Date.now() / 200) * 8;
                if (this.state === 'IDLE') ctx.translate(0, breath);

                // Hit effect (stutter/white)
                if (this.state === 'HIT') {
                    ctx.filter = 'brightness(5) contrast(10) invert(1)';
                    ctx.translate(Math.random() * 20 - 10, Math.random() * 10 - 5);
                }

                if (this.state === 'BLOCK') {
                    ctx.filter = 'grayscale(1) brightness(0.5)';
                }

                // Crouching stretch
                if (this.crouching) {
                    ctx.scale(1.2, 0.7);
                }

                // Draw Sprite (Individual)
                ctx.drawImage(this.sprite, 
                    0, 0, this.sprite.width, this.sprite.height, 
                    -this.width / 2 - 25, -this.height, this.width + 50, this.height
                );

                // 4. ADD PROCEDURAL EQUIPMENT
                if (this.player === 1) {
                    // Azure Katana
                    ctx.save();
                    ctx.translate(20, -100);
                    ctx.rotate(0.5 + (this.state === 'ATTACK' ? -0.8 : 0));
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = this.color;
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(10, -70); ctx.stroke();
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(10, -75); ctx.stroke();
                    ctx.restore();

                    // Energy Ponytail
                    if (Math.random() > 0.4) {
                        game.particles.push(new Particle(centerX, bottomY - this.height + 20, this.color, 'SPARK'));
                    }
                } else {
                    // Crimson Flaming Sword
                    ctx.save();
                    ctx.translate(30, -90);
                    ctx.rotate(0.3 + (this.state === 'ATTACK' ? -1.2 : 0));
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = this.color;
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(15, -80); ctx.stroke();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(15, -80); ctx.stroke();
                    // Sword fire particles
                    if (Math.random() > 0.5) {
                        game.particles.push(new Particle(centerX + (this.isFlipped ? -40 : 40), bottomY - 140, '#ff4400', 'EMBER'));
                    }
                    ctx.restore();
                }

                // Flickering Eye Bar
                const flicker = Math.random() > 0.1 ? 1 : 0.2;
                ctx.globalAlpha = flicker;
                ctx.fillStyle = this.state === 'HIT' ? '#fff' : this.color;
                ctx.shadowBlur = 20 * flicker;
                ctx.fillRect(-25, -this.height + 35, 60, 8); 
                
                if (Math.random() > 0.7) {
                    const sparkX = Math.random() * 60 - 25;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(sparkX, -this.height + 33, 4, 4);
                }
                ctx.restore();

                // Attack Visual FX (Drawn over character)
                if (this.state === 'ATTACK' && this.attackFrame >= 5 && this.attackFrame <= 10) {
                    ctx.save();
                    ctx.translate(centerX + (this.isFlipped ? -80 : 80), bottomY - 80);
                    ctx.shadowBlur = 40;
                    ctx.shadowColor = this.color;
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 10;
                    ctx.beginPath();
                    if (this.attackType === 'PUNCH') {
                        ctx.moveTo(-20, 0); ctx.lineTo(40, 0);
                    } else if (this.attackType === 'KICK') {
                        ctx.arc(0, 0, 50, -0.5, 0.5);
                    }
                    ctx.stroke();
                    ctx.restore();
                }
            }

            update() {
                // Update Trail
                if (this.state === 'DASH' || this.state === 'JUMP') {
                    this.trail.push({ x: this.pos.x, y: this.pos.y, opacity: 0.5 });
                    if (this.trail.length > this.maxTrail) this.trail.shift();
                } else {
                    if (this.trail.length > 0) this.trail.shift();
                }

                // Gravity
                this.pos.y += this.vel.y;
                if (this.pos.y + this.height + this.vel.y >= CONFIG.GROUND_Y) {
                    this.vel.y = 0;
                    this.pos.y = CONFIG.GROUND_Y - this.height;
                } else {
                    this.vel.y += CONFIG.GRAVITY;
                }

                // Movement
                this.pos.x += this.vel.x;
                this.vel.x *= CONFIG.FRICTION; // Enhanced Friction

                // State logic
                if (this.stun > 0) {
                    this.stun--;
                    this.state = 'HIT';
                } else if (this.health <= 0) {
                    this.state = 'DEAD';
                } else if (this.attackActive) {
                    this.state = 'ATTACK';
                    this.attackFrame++;
                    if (this.attackFrame > 15) { // Faster recovery
                        this.attackActive = false;
                        this.attackFrame = 0;
                    }
                } else if (this.vel.y !== 0) {
                    this.state = 'JUMP';
                } else if (Math.abs(this.vel.x) > CONFIG.WALK_SPEED + 1) {
                    this.state = 'DASH';
                } else if (Math.abs(this.vel.x) > 1) {
                    this.state = 'WALK';
                } else {
                    this.state = 'IDLE';
                }

                // Screen bounds
                if (this.pos.x < 0) this.pos.x = 0;
                if (this.pos.x + this.width > width) this.pos.x = width - this.width;

                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer === 0) {
                        this.combo = 0;
                        document.getElementById(`p${this.player}-combo`).classList.remove('show');
                    }
                }

                this.updateAttackBox();
                this.handleInput();
            }

            handleInput() {
                if (this.stun > 0 || this.health <= 0 || game.state !== 'FIGHTING') return;

                const p = this.player;
                const controls = {
                    left: p === 1 ? KEYS.a : KEYS.arrowleft,
                    right: p === 1 ? KEYS.d : KEYS.arrowright,
                    jump: p === 1 ? KEYS.w : KEYS.arrowup,
                    crouch: p === 1 ? KEYS.s : KEYS.arrowdown,
                    punch: p === 1 ? KEYS.j : KEYS.n1,
                    kick: p === 1 ? KEYS.k : KEYS.n2,
                    special: p === 1 ? KEYS.l : KEYS.n3,
                    block: p === 1 ? KEYS.shift : KEYS.n0
                };

                // Blocking
                this.blocking = controls.block;
                this.crouching = controls.crouch;

                // Dash / Run Logic
                let currentSpeed = CONFIG.WALK_SPEED;
                if (!this.crouching && !this.attackActive) {
                    if (controls.left) {
                        this.vel.x = -currentSpeed;
                        if (controls.block) this.vel.x *= 2; // Run when block+dir? Or just make it faster
                    }
                    if (controls.right) {
                        this.vel.x = currentSpeed;
                        if (controls.block) this.vel.x *= 2;
                    }
                    if (controls.jump && this.pos.y + this.height >= CONFIG.GROUND_Y - 5) {
                        this.vel.y = CONFIG.JUMP_FORCE;
                    }
                }

                // Attacks (Can attack during jump or crouch)
                if (controls.punch && !this.attackActive) this.attack('PUNCH');
                if (controls.kick && !this.attackActive) this.attack('KICK');

                if (this.energy >= 100) {
                    if (controls.special && !this.vel.y) {
                        this.attack('SPECIAL');
                        this.energy = 0;
                    }
                }
            }

            attack(type) {
                this.attackActive = true;
                this.attackType = type;
                this.attackFrame = 0;
                this.isAirAttack = this.vel.y !== 0;
                this.isLowAttack = this.crouching;

                if (type === 'SPECIAL') {
                    const dir = this.isFlipped ? -1 : 1;
                    game.fireballs.push(new Fireball(this.pos.x + this.width / 2, this.pos.y + 40, dir, this.color));
                }
            }

            updateAttackBox() {
                const dir = this.isFlipped ? -1 : 1;
                this.attackBox.width = this.attackType === 'PUNCH' ? 85 : 110;
                this.attackBox.height = this.isLowAttack ? 40 : 60;

                let attackY = this.pos.y + 40;
                if (this.isAirAttack) attackY = this.pos.y + 70;
                if (this.isLowAttack) attackY = this.pos.y + 110;
                if (this.attackType === 'KICK' && !this.isAirAttack && !this.isLowAttack) attackY = this.pos.y + 70;

                this.attackBox.pos = {
                    x: dir === 1 ? this.pos.x + this.width - 10 : this.pos.x - this.attackBox.width + 10,
                    y: attackY
                };
            }

            takeDamage(amount, knockbackDir) {
                if (this.blocking) {
                    amount *= 0.2;
                    this.vel.x = knockbackDir * (CONFIG.KNOCKBACK * 0.5);
                    this.energy += 2;
                } else {
                    this.health -= amount;
                    this.stun = CONFIG.HIT_STUN;
                    this.vel.x = knockbackDir * CONFIG.KNOCKBACK;
                    this.vel.y = -6; 
                    this.energy += 5;
                    game.shake = 15;
                    game.hitStop = 8; 
                    game.createHitParticles(this.pos.x + this.width / 2, this.pos.y + 50, this.color);
                    game.particles.push(new Particle(this.pos.x + this.width / 2, this.pos.y + 50, '#fff', 'SLASH'));
                    
                    // Combo logic for the attacker
                    const attacker = this.player === 1 ? game.p2 : game.p1;
                    attacker.combo++;
                    attacker.comboTimer = 60;
                    attacker.energy += 8;
                    const comboEl = document.getElementById(`p${attacker.player}-combo`);
                    comboEl.innerText = `${attacker.combo} HIT`;
                    comboEl.classList.add('show');
                }
                
                if (this.energy > 100) this.energy = 100;
                if (this.health < 0) this.health = 0;
            }
        }

        // --- GAME ENGINE ---

        const game = {
            state: 'START', // START, ROUND_INIT, FIGHTING, OVER
            p1: null,
            p2: null,
            timer: 99,
            timerMs: 0,
            round: 1,
            particles: [],
            fireballs: [],
            shake: 0,
            hitStop: 0,
            parallaxX: 0,

            init() {
                this.p1 = new Fighter({
                    position: { x: 100, y: 100 },
                    player: 1,
                    color: '#00f2ff',
                    name: 'AZURE SHADOW',
                    isFlipped: false
                });
                this.p2 = new Fighter({
                    position: { x: 800, y: 100 },
                    player: 2,
                    color: '#ff0055',
                    name: 'CRIMSON WRAITH',
                    isFlipped: true
                });

                this.loop();
            },

            resetRound() {
                this.p1.health = CONFIG.MAX_HEALTH;
                this.p2.health = CONFIG.MAX_HEALTH;
                this.p1.pos = { x: 150, y: 100 };
                this.p2.pos = { x: 800, y: 100 };
                this.p1.vel = { x: 0, y: 0 };
                this.p2.vel = { x: 0, y: 0 };
                this.p1.stun = 0;
                this.p2.stun = 0;
                this.p1.attackActive = false;
                this.p2.attackActive = false;
                this.fireballs = [];
                this.timer = 99;

                this.announceRound();
            },

            announceRound() {
                this.state = 'ROUND_INIT';
                const roundText = document.getElementById('round-announcer');
                const fightText = document.getElementById('fight-text');

                roundText.innerText = `ROUND ${this.round}`;
                roundText.classList.add('show');

                setTimeout(() => {
                    roundText.classList.remove('show');
                    fightText.classList.add('show');
                    this.state = 'FIGHTING';
                    setTimeout(() => {
                        fightText.classList.remove('show');
                    }, 1000);
                }, 2000);
            },

            update() {
                if (this.state === 'START' || this.state === 'ROUND_INIT') {
                    // Just update visual elements
                }

                this.p1.update();
                this.p2.update();

                // Flip fighters based on relative position
                this.p1.isFlipped = this.p1.pos.x > this.p2.pos.x;
                this.p2.isFlipped = this.p2.pos.x > this.p1.pos.x;

                // Collisions
                this.checkCollisions();

                // Fireballs
                this.fireballs.forEach((fb, i) => {
                    fb.update();
                    // Collision with players
                    const target = fb.dir === 1 ? this.p2 : this.p1;
                    if (this.rectCollision(fb, target)) {
                        target.takeDamage(fb.damage, fb.dir);
                        fb.active = false;
                    }
                    if (!fb.active) this.fireballs.splice(i, 1);
                });

                // Particles
                this.particles.forEach((p, i) => {
                    p.update();
                    if (p.life <= 0) this.particles.splice(i, 1);
                });

                // Timer
                if (this.state === 'FIGHTING') {
                    this.timerMs += 1000 / 60;
                    if (this.timerMs >= 1000) {
                        this.timer--;
                        this.timerMs = 0;
                        document.getElementById('timer').innerText = this.timer;
                        if (this.timer <= 0) this.endRound();
                    }
                }

                // Health check
                if (this.state === 'FIGHTING' && (this.p1.health <= 0 || this.p2.health <= 0)) {
                    this.endRound();
                }

                this.updateUI();
            },

            rectCollision(r1, r2) {
                return (
                    r1.x < r2.pos.x + r2.width &&
                    r1.x + (r1.width || 40) > r2.pos.x &&
                    r1.y < r2.pos.y + r2.height &&
                    r1.y + (r1.height || 10) > r2.pos.y
                );
            },

            checkCollisions() {
                if (this.state !== 'FIGHTING') return;

                // P1 Attacks P2
                if (this.p1.attackActive && this.p1.attackFrame === 5) { // Hit on frame 5
                    if (this.rectIntersect(this.p1.attackBox, this.p2)) {
                        this.p2.takeDamage(this.p1.attackType === 'PUNCH' ? 8 : 15, 1);
                    }
                }

                // P2 Attacks P1
                if (this.p2.attackActive && this.p2.attackFrame === 5) {
                    if (this.rectIntersect(this.p2.attackBox, this.p1)) {
                        this.p1.takeDamage(this.p2.attackType === 'PUNCH' ? 8 : 15, -1);
                    }
                }
            },

            rectIntersect(box, target) {
                return (
                    box.pos.x < target.pos.x + target.width &&
                    box.pos.x + box.width > target.pos.x &&
                    box.pos.y < target.pos.y + target.height &&
                    box.pos.y + box.height > target.pos.y
                );
            },

            createHitParticles(x, y, color) {
                for (let i = 0; i < 20; i++) {
                    this.particles.push(new Particle(x, y, color, 'SPARK'));
                }
            },

            endRound() {
                this.state = 'OVER';
                const koText = document.getElementById('ko-text');
                koText.classList.add('show');

                let winner = null;
                if (this.p1.health > this.p2.health) {
                    this.p1.wins++;
                    winner = this.p1;
                } else if (this.p2.health > this.p1.health) {
                    this.p2.wins++;
                    winner = this.p2;
                }

                this.updateWinsUI();

                setTimeout(() => {
                    koText.classList.remove('show');
                    if (this.p1.wins >= 2 || this.p2.wins >= 2) {
                        this.endGame(winner);
                    } else {
                        this.round++;
                        this.resetRound();
                    }
                }, 3000);
            },

            endGame(winner) {
                const overlay = document.getElementById('start-overlay');
                overlay.classList.remove('hidden');
                overlay.querySelector('h1').innerText = winner ? `${winner.name} WINS!` : 'DRAW!';
                overlay.querySelector('.btn').innerText = 'PLAY AGAIN';
            },

            updateUI() {
                const p1H = (this.p1.health / CONFIG.MAX_HEALTH) * 100;
                const p2H = (this.p2.health / CONFIG.MAX_HEALTH) * 100;

                document.getElementById('p1-health-fill').style.width = p1H + '%';
                document.getElementById('p2-health-fill').style.width = p2H + '%';
                document.getElementById('p1-health-fill-delay').style.width = p1H + '%';
                document.getElementById('p2-health-fill-delay').style.width = p2H + '%';

                // Change health bar color
                const colorP1 = p1H < 30 ? 'var(--neon-crimson)' : 'linear-gradient(90deg, #ff0, #0f0)';
                const colorP2 = p2H < 30 ? 'var(--neon-crimson)' : 'linear-gradient(-90deg, #ff0, #0f0)';
                document.getElementById('p1-health-fill').style.background = colorP1;
                document.getElementById('p2-health-fill').style.background = colorP2;

                // Energy Bars
                document.getElementById('p1-energy-fill').style.width = this.p1.energy + '%';
                document.getElementById('p2-energy-fill').style.width = this.p2.energy + '%';
                
                // Energy pulsating when full
                document.getElementById('p1-energy-container').style.borderColor = this.p1.energy >= 100 ? 'var(--neon-azure)' : 'rgba(255,255,255,0.1)';
                document.getElementById('p2-energy-container').style.borderColor = this.p2.energy >= 100 ? 'var(--neon-crimson)' : 'rgba(255,255,255,0.1)';
            },

            updateWinsUI() {
                const p1Stars = document.getElementById('p1-wins').children;
                const p2Stars = document.getElementById('p2-wins').children;
                for (let i = 0; i < 2; i++) {
                    p1Stars[i].className = i < this.p1.wins ? 'win-star active' : 'win-star';
                    p2Stars[i].className = i < this.p2.wins ? 'win-star active' : 'win-star';
                }
            },

            draw() {
                ctx.save();
                if (this.shake > 0) {
                    ctx.translate(Math.random() * this.shake - this.shake / 2, Math.random() * this.shake - this.shake / 2);
                    this.shake *= 0.9;
                }

                // 1. CLEAR
                ctx.fillStyle = '#0a0b1e';
                ctx.fillRect(0, 0, width, height);

                // 2. PARALLAX BACKGROUND
                this.drawBackground();

                // 3. CHARACTERS
                ctx.save();
                this.p1.draw(ctx);
                this.p2.draw(ctx);
                ctx.restore();

                // 3.5 WET FLOOR REFLECTIONS
                this.drawReflections();

                // 4. PROJECTILES
                this.fireballs.forEach(fb => fb.draw(ctx));

                // 5. PARTICLES
                this.particles.forEach(p => p.draw(ctx));
                
                // 5.2 RAIN
                if (Math.random() > 0.1) {
                    game.particles.push(new Particle(Math.random() * (width + 400), -50, '#fff', 'RAIN'));
                }

                // 5.5 GLOBAL LIGHTING OVERLAY (MIXING COLORS)
                this.drawLightingOverlay();

                // 6. GROUND
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, CONFIG.GROUND_Y, width, height - CONFIG.GROUND_Y);
                ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
                for (let i = 0; i < width; i += 40) {
                    ctx.beginPath(); ctx.moveTo(i, CONFIG.GROUND_Y); ctx.lineTo(i - 40, height); ctx.stroke();
                }

                ctx.restore();
            },

            drawBackground() {
                const pulse = Math.sin(Date.now() / 400);
                const pulseFast = Math.sin(Date.now() / 150);

                // 1. Cinematic Sky (Deep Atmospheric Gradient)
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, '#02030a');
                grad.addColorStop(0.4, '#080a1a');
                grad.addColorStop(0.8, '#1a102e');
                grad.addColorStop(1, '#250c26');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);

                // 2. Far Nebula / Smog Glow
                ctx.globalAlpha = 0.15;
                for (let i = 0; i < 2; i++) {
                    const x = (Date.now() / 200 * (i + 1)) % (width * 1.5) - width/2;
                    const g = ctx.createRadialGradient(x, 200, 0, x, 200, 500);
                    g.addColorStop(0, i % 2 === 0 ? '#ff00aa' : '#00aaff');
                    g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, width, height);
                }
                ctx.globalAlpha = 1.0;

                // 3. Stars (Atmospheric twinkling)
                ctx.fillStyle = '#fff';
                for (let i = 0; i < 80; i++) {
                    const x = (i * 203) % width;
                    const y = (i * 77) % 350;
                    const s = Math.random() * 1.5;
                    ctx.globalAlpha = 0.1 + Math.random() * 0.4;
                    ctx.fillRect(x, y, s, s);
                }

                // 4. Distant "Neo-Tokyo" Skyline (Level 1)
                const sOffset = this.p1.pos.x * 0.05;
                ctx.fillStyle = '#050510';
                for (let i = -2; i < 12; i++) {
                    const x = i * 120 - sOffset;
                    const h = 150 + (i * 67 % 100);
                    
                    // Skyscraper shape
                    ctx.fillRect(x, height - h - 60, 100, h);
                    
                    // Pagoda roof tops for Japan feel
                    if (i % 3 === 0) {
                        ctx.beginPath();
                        ctx.moveTo(x - 10, height - h - 60);
                        ctx.lineTo(x + 110, height - h - 60);
                        ctx.lineTo(x + 50, height - h - 85);
                        ctx.closePath();
                        ctx.fill();
                    }

                    // Windows
                    ctx.globalAlpha = 0.3 + pulse * 0.1;
                    ctx.fillStyle = i % 2 === 0 ? '#00f2ff' : '#ff0055';
                    for (let wx = 0; wx < 3; wx++) {
                        for (let wy = 0; wy < h/20; wy++) {
                            if ((wx + wy + i) % 4 === 0) {
                                ctx.fillRect(x + 15 + wx * 25, height - h - 45 + wy * 15, 6, 4);
                            }
                        }
                    }
                    ctx.globalAlpha = 1.0;
                    ctx.fillStyle = '#050510';
                }

                // 5. Atmospheric Fog Layer
                const fog = ctx.createLinearGradient(0, height - 200, 0, height - 60);
                fog.addColorStop(0, 'transparent');
                fog.addColorStop(1, 'rgba(10, 11, 30, 0.8)');
                ctx.fillStyle = fog;
                ctx.fillRect(0, height - 200, width, 140);

                // 6. Foreground Pillars & Torii Elements (Level 2)
                const pOffset = this.p1.pos.x * 0.15;
                for (let i = -1; i < 6; i++) {
                    const x = i * 350 - pOffset;
                    
                    // High-tech Torii Pillar
                    ctx.fillStyle = '#030308';
                    ctx.fillRect(x, 0, 30, height);
                    ctx.fillRect(x + 80, 0, 30, height); 
                    
                    // Cross bar
                    ctx.fillRect(x - 20, 100, 150, 20);
                    
                    // Neon strip
                    const neonColor = i % 2 === 0 ? 'var(--neon-azure)' : 'var(--neon-crimson)';
                    ctx.fillStyle = neonColor;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = neonColor;
                    ctx.globalAlpha = 0.6 + pulseFast * 0.2;
                    ctx.fillRect(x + 12, 0, 6, height);
                    ctx.fillRect(x + 92, 0, 6, height);
                    
                    // Kanji-style Neon Sign (Simplified)
                    if (i % 2 === 0) {
                        ctx.fillRect(x + 40, 150, 30, 60);
                        ctx.fillStyle = '#fff';
                        ctx.font = '20px Orbitron';
                        ctx.fillText('侍', x + 45, 190); 
                    }

                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1.0;
                }
            },

            drawReflections() {
                ctx.save();
                ctx.globalCompositeOperation = 'source-over';
                ctx.translate(0, CONFIG.GROUND_Y * 2);
                ctx.scale(1, -0.6); // Flattened reflection
                ctx.globalAlpha = 0.2;
                
                // Draw flipped characters
                this.p1.draw(ctx);
                this.p2.draw(ctx);
                
                // Add a blur filter to the reflection
                ctx.filter = 'blur(4px)';
                ctx.restore();

                // Ground overlay (Wet shine)
                ctx.save();
                const groundGrad = ctx.createLinearGradient(0, CONFIG.GROUND_Y, 0, height);
                groundGrad.addColorStop(0, 'rgba(0, 242, 255, 0.1)');
                groundGrad.addColorStop(0.5, 'rgba(0, 0, 0, 0.5)');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, CONFIG.GROUND_Y, width, height - CONFIG.GROUND_Y);
                ctx.restore();
            },

            drawLightingOverlay() {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                
                // Azure Glow from P1
                const grad1 = ctx.createRadialGradient(
                    this.p1.pos.x + this.p1.width/2, this.p1.pos.y + this.p1.height/2, 0,
                    this.p1.pos.x + this.p1.width/2, this.p1.pos.y + this.p1.height/2, 400
                );
                grad1.addColorStop(0, this.p1.color + '44');
                grad1.addColorStop(1, 'transparent');
                ctx.fillStyle = grad1;
                ctx.fillRect(0, 0, width, height);

                // Crimson Glow from P2
                const grad2 = ctx.createRadialGradient(
                    this.p2.pos.x + this.p2.width/2, this.p2.pos.y + this.p2.height/2, 0,
                    this.p2.pos.x + this.p2.width/2, this.p2.pos.y + this.p2.height/2, 400
                );
                grad2.addColorStop(0, this.p2.color + '44');
                grad2.addColorStop(1, 'transparent');
                ctx.fillStyle = grad2;
                ctx.fillRect(0, 0, width, height);
                
                ctx.restore();
            },

            loop() {
                if (this.hitStop > 0) {
                    this.hitStop--;
                } else {
                    this.update();
                }
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        };

        // Start button
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-overlay').classList.add('hidden');
            game.round = 1;
            game.p1.wins = 0;
            game.p2.wins = 0;
            game.updateWinsUI();
            game.resetRound();
        });

        // Initialize Engine
        game.init();

    </script>
</body>

</html>
